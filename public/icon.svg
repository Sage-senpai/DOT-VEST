<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="60" y1="30" x2="120" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff2d78"/>
      <stop offset="100%" stop-color="#00e5a0"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff2d78"/>
      <stop offset="50%" stop-color="#e91e8c"/>
      <stop offset="100%" stop-color="#00e5a0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bgGrad)"/>
  <!-- Lightning bolt / yield arrow -->
  <path d="M100 28L62 92h30L72 152l58-72H98L118 28z" fill="url(#boltGrad)" opacity="0.95"/>
  <!-- Polkadot dots (3 dots representing the ecosystem) -->
  <circle cx="38" cy="40" r="10" fill="url(#dotGrad)" opacity="0.8"/>
  <circle cx="142" cy="40" r="10" fill="url(#dotGrad)" opacity="0.6"/>
  <circle cx="142" cy="140" r="10" fill="url(#dotGrad)" opacity="0.4"/>
</svg>
